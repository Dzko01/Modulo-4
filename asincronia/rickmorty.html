<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio Práctico - Api Rest n°1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container my-4">
        <h1 class="text-center mb-4">Rick and Morty API</h1>

        <div class="d-flex gap-2 justify-content-center mb-4">
            <button id="btn-characters" class="btn btn-primary">Obtener Personajes</button>
            <button id="btn-grouped" class="btn btn-secondary">Agrupar por Especie</button>
        </div>

        <hr>

        <div class="row">
            <div class="col-md-8">
                <h3>Lista de Personajes</h3>
                <section id="characters" class="row row-cols-2 row-cols-lg-4 g-3">
                    </section>
            </div>

            <div class="col-md-4">
                <div class="mb-4">
                    <h3>Agrupación por Especie</h3>
                    <div id="species-group">
                        </div>
                </div>

                <div>
                    <h3>Ficha Individual</h3>
                    <div id="single-card">
                        </div>
                </div>
            </div>
        </div>
    </div>

    <script src="./assets/js/rickmorty.js"></script>
</body>

</html>
